  url: https://handbook.apra.gov.au/standard/cps-001
  category: APRA
  expected_last_modified: null
- name: "CPS 190 \xE2\u20AC\u201D Recovery and Exit Planning"
  summary: Requires APRA-regulated entities to develop and maintain recovery and exit
